<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zonely AFK Client</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #ffffff;
    }
    main {
      width: min(520px, calc(100% - 32px));
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 10px;
      background: rgba(255, 255, 255, .06);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }
    p {
      margin: 8px 0;
      color: #cbd5e1;
      line-height: 1.5;
    }
    code {
      display: block;
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      color: #e5e7eb;
      background: rgba(0, 0, 0, .28);
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <h1>Zonely AFK Client</h1>
    <p>Tarayıcı destekli AFK istemcisi hazır.</p>
    <p>Proxy: <strong>https://proxy.mcraft.fun</strong></p>
    <code>zonely-afkbot-browser-client.bundle.js</code>
  </main>
  <script>
    window.ZONELY_AFKBOT_DEFAULT_PROXY = 'https://proxy.mcraft.fun';
  </script>
  <script src="./zonely-afkbot-browser-client.bundle.js"></script>
</body>
</html>
